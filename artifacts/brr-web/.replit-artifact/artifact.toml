kind = "web"
previewPath = "/"
title = "BRR Liquor Soft"
version = "1.0.0"
id = "artifacts/brr-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18172

[services.development]
run = "pnpm --filter @workspace/brr-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/brr-web", "run", "build" ]
publicDir = "artifacts/brr-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18172"
BASE_PATH = "/"
